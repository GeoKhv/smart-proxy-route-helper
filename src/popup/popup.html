<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title data-i18n="extensionName"></title>
    <style>
      :root {
        color-scheme: light dark;
        font-family:
          ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      * {
        box-sizing: border-box;
      }

      body {
        width: 330px;
        margin: 0;
        padding: 16px;
        background: Canvas;
        color: CanvasText;
      }

      h1 {
        margin: 0;
        font-size: 18px;
        line-height: 1.25;
      }

      h2 {
        margin: 16px 0 6px;
        font-size: 13px;
        line-height: 1.3;
      }

      p {
        margin: 0;
        color: color-mix(in srgb, CanvasText 72%, Canvas);
        font-size: 13px;
        line-height: 1.5;
      }

      button {
        width: 100%;
        min-height: 36px;
        border: 1px solid color-mix(in srgb, CanvasText 24%, Canvas);
        border-radius: 6px;
        background: ButtonFace;
        color: ButtonText;
        font: inherit;
        font-size: 13px;
        cursor: pointer;
      }

      button:hover {
        border-color: color-mix(in srgb, CanvasText 44%, Canvas);
      }

      button:disabled {
        cursor: progress;
        opacity: 0.72;
      }

      button:focus-visible {
        outline: 2px solid Highlight;
        outline-offset: 2px;
      }

      button + button {
        margin-top: 8px;
      }

      label,
      select {
        font: inherit;
        font-size: 13px;
      }

      label {
        display: grid;
        gap: 6px;
      }

      select {
        width: 100%;
        min-height: 36px;
        border: 1px solid color-mix(in srgb, CanvasText 24%, Canvas);
        border-radius: 6px;
        padding: 7px 8px;
        background: Canvas;
        color: CanvasText;
      }

      .domain {
        margin-top: 8px;
        padding: 8px;
        border: 1px solid color-mix(in srgb, CanvasText 18%, Canvas);
        border-radius: 6px;
        overflow-wrap: anywhere;
        font-family: ui-monospace, SFMono-Regular, Consolas, "Liberation Mono", monospace;
        font-size: 13px;
      }

      .status {
        margin-top: 8px;
        padding: 10px;
        border: 1px solid color-mix(in srgb, CanvasText 18%, Canvas);
        border-radius: 6px;
        color: color-mix(in srgb, CanvasText 80%, Canvas);
        font-size: 13px;
        line-height: 1.45;
        white-space: pre-line;
      }

      .status[data-kind="success"] {
        border-color: #2d7d46;
        color: #1f6b38;
      }

      .status[data-kind="error"] {
        border-color: #a33a3a;
        color: #8d2e2e;
      }

      .route-status-summary {
        display: flex;
        align-items: center;
        gap: 8px;
      }

      .route-status-indicator {
        width: 12px;
        height: 12px;
        flex: 0 0 12px;
        border: 2px solid color-mix(in srgb, CanvasText 52%, Canvas);
        border-radius: 50%;
        background: transparent;
      }

      .route-status-label {
        color: CanvasText;
        font-size: 15px;
      }

      .route-status-explanation {
        margin-top: 5px;
      }

      .route-status[data-appearance="proxy"] .route-status-indicator {
        border-color: #16803d;
        background: #16803d;
      }

      .route-status[data-appearance="direct"] .route-status-indicator {
        border-color: #2563b8;
        background: #2563b8;
      }

      .route-status[data-appearance="warning"] .route-status-indicator,
      .route-status[data-appearance="blocked"] .route-status-indicator {
        border-color: #b54708;
        background: #b54708;
      }

      .microcopy {
        margin-top: 8px;
        font-size: 12px;
      }

      .scope-editor {
        display: grid;
        gap: 10px;
        margin-top: 10px;
        padding: 10px;
        border: 1px solid color-mix(in srgb, CanvasText 18%, Canvas);
        border-radius: 6px;
      }

      .scope-editor[hidden] {
        display: none;
      }

      .scope-preview {
        margin-top: 0;
        white-space: normal;
      }

      .scope-preview p + p {
        margin-top: 6px;
      }

      .scope-preview-list {
        margin: 5px 0 0;
        padding-left: 20px;
      }

      .scope-warning {
        color: color-mix(in srgb, CanvasText 82%, Canvas);
        font-weight: 600;
      }

      .actions {
        margin-top: 12px;
      }

      .secondary {
        margin-top: 8px;
      }

      .candidate-group + .candidate-group {
        margin-top: 10px;
      }

      .related-domain-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 8px;
        margin-bottom: 8px;
      }

      .related-domain-back {
        width: auto;
        min-height: 28px;
        padding: 4px 8px;
        background: transparent;
        font-size: 12px;
      }

      .candidate-list {
        position: relative;
      }

      .candidate-group-title {
        margin-bottom: 6px;
        color: color-mix(in srgb, CanvasText 84%, Canvas);
        font-size: 12px;
        font-weight: 700;
      }

      .candidate-row {
        display: flex;
        flex-wrap: wrap;
        align-items: flex-start;
        gap: 8px;
        margin-top: 2px;
        padding: 8px;
        border: 1px solid transparent;
        border-top-color: color-mix(in srgb, CanvasText 12%, Canvas);
        border-radius: 6px;
        font-size: 12px;
      }

      .candidate-row:first-of-type {
        border-top: 0;
      }

      .candidate-row[data-selected="true"] {
        border-color: color-mix(in srgb, Highlight 58%, Canvas);
        background: color-mix(in srgb, Highlight 14%, Canvas);
        box-shadow: inset 3px 0 0 Highlight;
      }

      .candidate-row[data-covered="true"] {
        background: color-mix(in srgb, CanvasText 5%, Canvas);
        color: color-mix(in srgb, CanvasText 70%, Canvas);
      }

      .candidate-row[data-category="ignored"] {
        color: color-mix(in srgb, CanvasText 68%, Canvas);
      }

      .candidate-row input {
        flex: 0 0 auto;
        width: 16px;
        height: 16px;
        margin: 2px 0 0;
        accent-color: Highlight;
      }

      .candidate-content {
        flex: 1 1 auto;
        min-width: 0;
      }

      .candidate-domain {
        display: block;
        overflow-wrap: anywhere;
        font-family: ui-monospace, SFMono-Regular, Consolas, "Liberation Mono", monospace;
        color: CanvasText;
      }

      .candidate-meta,
      .candidate-note {
        display: block;
        margin-top: 3px;
        color: color-mix(in srgb, CanvasText 66%, Canvas);
        line-height: 1.35;
      }

      .candidate-actions {
        display: flex;
        flex-wrap: wrap;
        gap: 6px;
        margin-top: 6px;
      }

      .candidate-add-action {
        flex: 0 0 100%;
        border-color: Highlight;
        background: Highlight;
        color: HighlightText;
        font-weight: 700;
      }

      .candidate-add-action[data-state="added"]:disabled {
        cursor: default;
        opacity: 1;
      }

      .candidate-more-actions {
        flex: 0 0 100%;
        padding-left: 24px;
      }

      .candidate-more-actions summary {
        width: fit-content;
        color: color-mix(in srgb, CanvasText 68%, Canvas);
        cursor: pointer;
        font-size: 12px;
      }

      .candidate-more-actions summary:focus-visible {
        border-radius: 3px;
        outline: 2px solid Highlight;
        outline-offset: 2px;
      }

      .candidate-action {
        width: auto;
        min-height: 28px;
        padding: 4px 8px;
        font-size: 12px;
      }

      .candidate-actions button + button {
        margin-top: 0;
      }

      .candidate-batch-panel {
        position: sticky;
        z-index: 2;
        bottom: -2px;
        margin: 10px -2px -2px;
        padding: 10px 2px 2px;
        background: linear-gradient(to bottom, transparent, Canvas 26%);
      }

      .candidate-batch-panel[hidden] {
        display: none;
      }

      .candidate-batch-panel button {
        border-color: Highlight;
        background: Highlight;
        color: HighlightText;
        font-weight: 700;
      }
    </style>
  </head>
  <body>
    <main>
      <h1 data-i18n="extensionName"></h1>
      <p data-i18n="popupIntro"></p>

      <section aria-labelledby="current-site-title">
        <h2 id="current-site-title" data-i18n="popupCurrentSiteTitle"></h2>
        <div class="domain" id="current-domain" aria-live="polite" data-i18n="popupLoadingCurrentSite"></div>
      </section>

      <section aria-labelledby="route-status-title">
        <h2 id="route-status-title" data-i18n="popupRouteStatusTitle"></h2>
        <div
          class="status route-status"
          id="route-status"
          role="status"
          aria-live="polite"
          data-i18n="popupCheckingCurrentSite"
          data-i18n-aria-label="popupCheckingCurrentSiteAria"
        ></div>
      </section>

      <section class="actions" aria-labelledby="actions-title">
        <h2 id="actions-title" data-i18n="popupActionsTitle"></h2>
        <button type="button" id="add-current-site" hidden data-i18n="popupProxyThisHostname"></button>
        <button type="button" id="add-current-site-direct" hidden data-i18n="popupDirectThisHostname"></button>
        <p class="microcopy" id="quick-action-scope-copy" data-i18n="popupNewRuleScopeCopy"></p>
        <button type="button" id="change-current-site-scope" hidden data-i18n="popupChangeScope"></button>
        <button type="button" id="remove-current-site" hidden data-i18n="popupRemoveExactRule"></button>
        <div class="scope-editor" id="scope-change-editor" hidden>
          <strong data-i18n="popupChangeScope"></strong>
          <p id="scope-change-action"></p>
          <label>
            <span data-i18n="popupRuleScopeLabel"></span>
            <select id="scope-change-select"></select>
          </label>
          <div class="status scope-preview" id="scope-change-preview" aria-live="polite"></div>
          <button type="button" id="confirm-scope-change" disabled data-i18n="popupConfirmScopeChange"></button>
          <button type="button" id="cancel-scope-change" data-i18n="commonCancel"></button>
        </div>
        <button type="button" id="check-via-proxy" hidden data-i18n="popupCheckViaProxy"></button>
        <button type="button" id="preview-related-domains" hidden data-i18n="popupPreviewRelatedDomains"></button>
        <button type="button" id="start-related-domain-recording" hidden data-i18n="popupStartRecording"></button>
        <button type="button" id="stop-related-domain-recording" hidden data-i18n="popupStopAndPreview"></button>
        <button type="button" id="cancel-related-domain-recording" hidden data-i18n="popupCancelRecording"></button>
        <button type="button" id="save-diagnostic-rule" hidden data-i18n="popupAddCheckedRule"></button>
        <button type="button" id="open-options" class="secondary" data-i18n="popupOpenOptions"></button>
        <div class="status" id="action-status" aria-live="polite" data-i18n="popupLoadingActions"></div>
        <div class="status" id="related-domain-preview" aria-live="polite" hidden></div>
      </section>
    </main>
    <script type="module" src="./popup.ts"></script>
  </body>
</html>
