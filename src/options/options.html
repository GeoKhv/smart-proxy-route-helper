<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title data-i18n="optionsDocumentTitle"></title>
    <style>
      :root {
        color-scheme: light dark;
        font-family:
          ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        background: Canvas;
        color: CanvasText;
      }

      main {
        max-width: 920px;
        margin: 0 auto;
        padding: 32px 20px 48px;
      }

      h1,
      h2,
      h3,
      p {
        margin-block-start: 0;
      }

      h1 {
        margin-block-end: 8px;
        font-size: 26px;
        line-height: 1.25;
      }

      h2 {
        margin-block-end: 8px;
        font-size: 20px;
        line-height: 1.3;
      }

      h3 {
        margin-block-end: 10px;
        font-size: 16px;
      }

      p {
        color: color-mix(in srgb, CanvasText 72%, Canvas);
        font-size: 15px;
        line-height: 1.55;
      }

      section {
        margin-top: 24px;
        padding-top: 24px;
        border-top: 1px solid color-mix(in srgb, CanvasText 18%, Canvas);
      }

      form {
        display: grid;
        gap: 16px;
        margin-top: 18px;
      }

      label {
        display: grid;
        gap: 6px;
        font-size: 14px;
        font-weight: 600;
      }

      input,
      select,
      button {
        font: inherit;
      }

      input,
      select,
      textarea {
        width: 100%;
        min-height: 38px;
        border: 1px solid color-mix(in srgb, CanvasText 28%, Canvas);
        border-radius: 6px;
        padding: 8px 10px;
        background: Canvas;
        color: CanvasText;
      }

      textarea {
        min-height: 160px;
        resize: vertical;
        font-family:
          ui-monospace, SFMono-Regular, Consolas, "Liberation Mono", Menlo, monospace;
        font-size: 13px;
        line-height: 1.45;
      }

      button {
        min-height: 38px;
        border: 1px solid color-mix(in srgb, CanvasText 28%, Canvas);
        border-radius: 6px;
        padding: 8px 12px;
        background: ButtonFace;
        color: ButtonText;
        cursor: pointer;
      }

      button:hover {
        border-color: color-mix(in srgb, CanvasText 48%, Canvas);
      }

      .grid {
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 12px;
      }

      .checkbox-row {
        display: flex;
        align-items: center;
        gap: 10px;
        font-weight: 600;
      }

      .checkbox-row input {
        width: 18px;
        min-height: 18px;
      }

      .hint {
        margin: 0;
        font-size: 13px;
      }

      .stack {
        display: grid;
        gap: 12px;
        margin-top: 18px;
      }

      .actions {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
        align-items: center;
      }

      .status {
        margin-top: 12px;
        min-height: 22px;
        font-size: 14px;
      }

      .status[data-kind="error"],
      .error {
        color: #b42318;
      }

      .status[data-kind="success"] {
        color: #067647;
      }

      .error {
        min-height: 18px;
        font-size: 13px;
        font-weight: 500;
      }

      .rule-list {
        display: grid;
        gap: 8px;
        margin: 18px 0 0;
        padding: 0;
        list-style: none;
      }

      .rule-item {
        display: grid;
        grid-template-columns: 1fr auto;
        gap: 12px;
        align-items: center;
        padding: 12px;
        border: 1px solid color-mix(in srgb, CanvasText 16%, Canvas);
        border-radius: 6px;
      }

      .rule-domain {
        font-weight: 700;
      }

      .rule-item-actions {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
      }

      .metadata {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        margin-top: 4px;
        color: color-mix(in srgb, CanvasText 64%, Canvas);
        font-size: 13px;
      }

      .empty {
        margin-top: 14px;
        padding: 12px;
        border: 1px dashed color-mix(in srgb, CanvasText 22%, Canvas);
        border-radius: 6px;
        color: color-mix(in srgb, CanvasText 70%, Canvas);
      }

      .preview-list {
        display: grid;
        gap: 6px;
        margin: 0;
        padding-left: 20px;
        font-size: 14px;
        line-height: 1.45;
      }

      .rule-editor {
        display: grid;
        gap: 14px;
        margin-top: 18px;
        padding: 16px;
        border: 1px solid color-mix(in srgb, Highlight 46%, Canvas);
        border-radius: 8px;
        background: color-mix(in srgb, Highlight 5%, Canvas);
      }

      .rule-editor[hidden] {
        display: none;
      }

      .rule-edit-preview {
        margin-top: 0;
        padding: 12px;
        border: 1px solid color-mix(in srgb, CanvasText 16%, Canvas);
        border-radius: 6px;
      }

      .rule-edit-preview p + p {
        margin-top: 8px;
      }

      .edit-warning {
        font-weight: 600;
      }

      .conflict-panel {
        margin-top: 18px;
        padding: 16px;
        border: 2px solid #b54708;
        border-radius: 8px;
        background: color-mix(in srgb, #b54708 8%, Canvas);
      }

      .conflict-panel[hidden] {
        display: none;
      }

      .conflict-panel h3 {
        color: #b54708;
      }

      .conflict-item {
        border-color: color-mix(in srgb, #b54708 52%, Canvas);
      }

      @media (max-width: 720px) {
        .grid,
        .rule-item {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    <main>
      <h1 data-i18n="extensionName"></h1>
      <p data-i18n="optionsIntro"></p>

      <section aria-labelledby="local-proxy-title">
        <h2 id="local-proxy-title" data-i18n="optionsLocalProxyTitle"></h2>
        <p data-i18n="optionsLocalProxyDescription"></p>

        <form id="local-proxy-form" novalidate>
          <label class="checkbox-row">
            <input id="proxy-enabled" name="enabled" type="checkbox" />
            <span data-i18n="optionsEnableProxy"></span>
          </label>

          <div class="grid">
            <label>
              <span data-i18n="optionsProxySchemeLabel"></span>
              <select id="proxy-scheme" name="scheme">
                <option value="socks5">socks5</option>
                <option value="socks4">socks4</option>
                <option value="http">http</option>
                <option value="https">https</option>
              </select>
              <span class="error" id="proxy-scheme-error" aria-live="polite"></span>
            </label>

            <label>
              <span data-i18n="optionsProxyHostLabel"></span>
              <input id="proxy-host" name="host" type="text" autocomplete="off" placeholder="127.0.0.1" />
              <span class="error" id="proxy-host-error" aria-live="polite"></span>
            </label>

            <label>
              <span data-i18n="optionsProxyPortLabel"></span>
              <input id="proxy-port" name="port" type="number" inputmode="numeric" min="1" max="65535" placeholder="10808" />
              <span class="error" id="proxy-port-error" aria-live="polite"></span>
            </label>
          </div>

          <p class="hint" data-i18n="optionsSuggestedProxy"></p>
          <div>
            <button type="submit" data-i18n="optionsSaveLocal"></button>
          </div>
        </form>
        <p class="status" id="local-proxy-status" aria-live="polite"></p>
      </section>

      <section aria-labelledby="rules-title">
        <h2 id="rules-title" data-i18n="optionsRulesTitle"></h2>
        <p data-i18n="optionsRulesDescription"></p>

        <form id="rule-form" novalidate>
          <label>
            <span data-i18n="optionsDomainLabel"></span>
            <input id="rule-domain" name="domain" type="text" autocomplete="off" placeholder="letterboxd.com" />
            <span class="error" id="rule-domain-error" aria-live="polite"></span>
          </label>

          <label>
            <span data-i18n="optionsRouteActionLabel"></span>
            <select id="rule-action" name="action">
              <option value="proxy" data-i18n="optionsRouteThroughProxy"></option>
              <option value="direct" data-i18n="optionsRouteDirectly"></option>
            </select>
          </label>

          <label>
            <span data-i18n="popupRuleScopeLabel"></span>
            <select id="rule-scope" name="scope">
              <option value="exact" data-i18n="commonExactHostname"></option>
              <option value="hostname-and-subdomains" data-i18n="commonHostnameAndSubdomains"></option>
            </select>
            <span class="hint" data-i18n="optionsRuleScopeHint"></span>
          </label>

          <div>
            <button type="submit" data-i18n="optionsAddRule"></button>
          </div>
        </form>
        <p class="status" id="rule-status" aria-live="polite"></p>

        <div class="conflict-panel" id="route-rule-conflicts" role="alert" hidden>
          <h3 data-i18n="optionsConflictsTitle"></h3>
          <p data-i18n="optionsConflictsDescription"></p>
          <ul class="rule-list" id="route-rule-conflict-list"></ul>
          <p class="status" id="route-rule-conflict-status" aria-live="polite"></p>
        </div>

        <ul class="rule-list" id="rule-list"></ul>

        <div class="rule-editor" id="rule-editor" aria-labelledby="rule-editor-title" hidden>
          <h3 id="rule-editor-title" data-i18n="optionsEditRuleTitle"></h3>
          <label>
            <span data-i18n="optionsHostnameLabel"></span>
            <input id="rule-edit-domain" type="text" autocomplete="off" />
            <span class="error" id="rule-edit-domain-error" aria-live="polite"></span>
          </label>
          <label>
            <span data-i18n="optionsRouteActionLabel"></span>
            <select id="rule-edit-action">
              <option value="proxy" data-i18n="commonProxy"></option>
              <option value="direct" data-i18n="commonDirect"></option>
            </select>
          </label>
          <label>
            <span data-i18n="popupRuleScopeLabel"></span>
            <select id="rule-edit-scope"></select>
            <span class="hint" data-i18n="optionsSafeParentHint"></span>
          </label>
          <div class="actions">
            <button id="preview-rule-edit" type="button" data-i18n="optionsPreviewChanges"></button>
            <button id="save-rule-edit" type="button" disabled data-i18n="optionsSaveChanges"></button>
            <button id="cancel-rule-edit" type="button" data-i18n="commonCancel"></button>
          </div>
          <div class="rule-edit-preview" id="rule-edit-preview" aria-live="polite" data-i18n="optionsPreviewBeforeSave"></div>
        </div>
      </section>

      <section aria-labelledby="rule-cleanup-title">
        <h2 id="rule-cleanup-title" data-i18n="optionsOptimizeTitle"></h2>
        <p data-i18n="optionsOptimizeDescription"></p>
        <div class="actions">
          <button id="find-redundant-rules" type="button" data-i18n="optionsFindRedundant"></button>
        </div>
        <p class="status" id="rule-cleanup-status" aria-live="polite"></p>
        <ul class="rule-list" id="rule-cleanup-list"></ul>
      </section>

      <section aria-labelledby="denylist-title">
        <h2 id="denylist-title" data-i18n="optionsDenylistTitle"></h2>
        <p data-i18n="optionsDenylistDescription"></p>
        <div id="denylist-summary" class="empty" data-i18n="optionsLoadingLists"></div>
      </section>

      <section aria-labelledby="classification-overrides-title">
        <h2 id="classification-overrides-title" data-i18n="optionsOverridesTitle"></h2>
        <p data-i18n="optionsOverridesDescription"></p>
        <p class="status" id="classification-overrides-status" aria-live="polite"></p>
        <ul class="rule-list" id="classification-overrides-list"></ul>
      </section>

      <section aria-labelledby="backup-restore-title">
        <h2 id="backup-restore-title" data-i18n="optionsBackupTitle"></h2>
        <p data-i18n="optionsBackupDescription"></p>

        <div class="stack">
          <h3 data-i18n="optionsExportTitle"></h3>
          <label class="checkbox-row">
            <input id="backup-include-local-proxy" name="includeLocalProxyConfig" type="checkbox" />
            <span data-i18n="optionsIncludeLocalProxy"></span>
          </label>
          <p class="hint" data-i18n="optionsLocalProxyBackupHint"></p>
          <div class="actions">
            <button id="export-settings-button" type="button" data-i18n="optionsExportButton"></button>
          </div>
          <label>
            <span data-i18n="optionsExportJsonLabel"></span>
            <textarea id="export-settings-output" readonly spellcheck="false"></textarea>
          </label>
          <p class="status" id="export-settings-status" aria-live="polite"></p>
        </div>

        <div class="stack">
          <h3 data-i18n="optionsImportTitle"></h3>
          <label>
            <span data-i18n="optionsImportJsonLabel"></span>
            <textarea
              id="import-settings-input"
              spellcheck="false"
              data-i18n-placeholder="optionsImportPlaceholder"
            ></textarea>
          </label>
          <div class="actions">
            <button id="preview-import-button" type="button" data-i18n="optionsPreviewImport"></button>
            <button id="apply-import-button" type="button" disabled data-i18n="optionsApplyImport"></button>
          </div>
          <div id="import-preview" class="empty" aria-live="polite" data-i18n="optionsNoImportPreview"></div>
          <p class="status" id="import-settings-status" aria-live="polite"></p>
        </div>
      </section>
    </main>
    <script type="module" src="./options.ts"></script>
  </body>
</html>
