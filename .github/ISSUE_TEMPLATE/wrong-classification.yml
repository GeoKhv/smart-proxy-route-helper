name: Wrong classification
description: Report a related-domain preview classification that looks wrong.
title: "Wrong classification: "
labels: ["domain-classification"]
body:
  - type: markdown
    attributes:
      value: |
        Share sanitized domain-level information only. Do not include full URLs, private paths, query strings, account data, page text, or unredacted screenshots.
  - type: input
    id: site-domain
    attributes:
      label: Site domain
      description: The site where the candidate appeared.
      placeholder: example.com
    validations:
      required: true
  - type: input
    id: candidate-domain
    attributes:
      label: Candidate domain
      description: The candidate domain that was classified incorrectly.
      placeholder: cdn.example.net
    validations:
      required: true
  - type: dropdown
    id: actual-classification
    attributes:
      label: Current classification
      options:
        - Likely related
        - Review manually
        - Ignored
        - Not sure
    validations:
      required: true
  - type: dropdown
    id: expected-classification
    attributes:
      label: Expected classification
      options:
        - Likely related
        - Review manually
        - Ignored
    validations:
      required: true
  - type: textarea
    id: rationale
    attributes:
      label: Rationale
      description: Explain the expected behavior without including raw URLs or private data.
    validations:
      required: true
  - type: checkboxes
    id: privacy-check
    attributes:
      label: Privacy check
      options:
        - label: I included domain-level information only and removed private or identifying details.
          required: true
