name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Type-check
        run: npm run typecheck

      - name: Build extension
        run: npm run build

      - name: Check patch whitespace
        run: git diff --check

      - name: Package extension
        run: npm run package

      - name: Validate manifest and release ZIP surface
        run: npm run check:release-surface

      - name: Verify deterministic package
        shell: bash
        run: |
          archive="release/smart-proxy-route-helper-v$(node -p "require('./package.json').version").zip"
          first_hash="$(sha256sum "$archive" | cut -d ' ' -f 1)"
          npm run build
          npm run package
          second_hash="$(sha256sum "$archive" | cut -d ' ' -f 1)"
          test "$first_hash" = "$second_hash"

      - name: Audit production and development dependencies
        run: npm audit --audit-level=high
